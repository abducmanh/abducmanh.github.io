<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lỗi Hệ Thống</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 24px 24px; }
        }

        /* Hiệu ứng chớp nhẹ của màn hình cũ */
        @keyframes crtFlicker {
            0% { opacity: 0.95; }
            5% { opacity: 0.85; }
            10% { opacity: 0.95; }
            15% { opacity: 1; }
            100% { opacity: 1; }
        }

        body {
            background-color: #050505;
            color: #ededed;
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Lưới nền tinh tế */
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                radial-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 24px 24px, 96px 96px;
            animation: moveGrid 8s linear infinite, crtFlicker 6s infinite;
        }

        /* Hiệu ứng sọc ngang (Scanlines) của màn hình điện tử */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
        }

        /* Thẻ kính (Đứng im tuyệt đối) */
        .spotlight-card {
            position: relative;
            background: rgba(15, 15, 15, 0.6); 
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 32rem;
            width: 90%;
            z-index: 10;
        }

        /* Ánh sáng hắt nền (Hoạt động theo chuột) */
        .spotlight-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                rgba(255, 255, 255, 0.06),
                transparent 40%
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Viền sáng bám theo chuột */
        .spotlight-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: radial-gradient(
                400px circle at var(--mouse-x) var(--mouse-y),
                rgba(255, 255, 255, 0.5),
                transparent 40%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .hacker-text {
            font-variant-numeric: tabular-nums;
            cursor: default;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            display: inline-block;
            width: 0.6em;
            height: 1.1em;
            background-color: #ef4444; /* Chuyển con trỏ sang màu đỏ cho ngầu */
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            transform: translateY(2px);
        }

        /* Tùy chỉnh thanh cuộn cho đẹp nếu text quá dài */
        .typewriter-container {
            min-height: 5rem;
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body class="selection:bg-neutral-700 selection:text-white">

    <main class="spotlight-card" id="card">
        <div class="content">
            
            <!-- Thanh điều khiển giả lập Terminal -->
            <div class="flex items-center gap-2 mb-8 border-b border-neutral-800 pb-3">
                <div class="w-3 h-3 rounded-full bg-red-500/80 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/80 shadow-[0_0_8px_rgba(234,179,8,0.5)]"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                <span class="ml-2 text-xs text-neutral-500 font-mono tracking-widest lowercase">system/core/panic.log</span>
            </div>

            <div class="text-center">
                <!-- Chữ 404 lớn -->
                <h1 class="text-7xl md:text-8xl font-black tracking-tighter mb-2 text-white hacker-text drop-shadow-lg" data-value="404">
                    404
                </h1>
                
                <h2 class="text-xl md:text-2xl font-semibold text-neutral-300 tracking-widest mb-8 uppercase">
                    <span class="hacker-text text-transparent bg-clip-text bg-gradient-to-r from-white to-neutral-500" data-value="LỖI TRUY XUẤT">
                        LỖI TRUY XUẤT
                    </span>
                </h2>

                <!-- Vùng hiển thị Text Typewriter -->
                <div class="bg-neutral-900/50 border border-neutral-800 rounded p-4 mb-8 text-sm md:text-base font-mono text-neutral-400 max-w-sm mx-auto shadow-inner">
                    <div class="typewriter-container" id="typewriter-text">
                        <!-- Text sẽ được JS gõ vào đây -->
                    </div><span class="cursor-blink"></span>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="https://2fa.tokyo/" class="group relative inline-flex items-center justify-center px-6 py-3 text-sm font-semibold text-neutral-300 transition-all bg-neutral-900 border border-neutral-700 rounded-lg hover:bg-neutral-800 hover:text-white hover:border-neutral-500 focus:outline-none">
                        <svg class="w-4 h-4 mr-2 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        Trở về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const card = document.getElementById('card');

        // Logic xử lý Spotlight bám theo chuột (Chỉ ánh sáng, không di chuyển thẻ)
        const updateSpotlight = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const rect = card.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        };

        window.addEventListener('mousemove', updateSpotlight);
        window.addEventListener('touchmove', updateSpotlight);

        // Hiệu ứng giải mã chữ (Text Scramble/Decrypt)
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}[]|;:,.<>?";
        const hackerTexts = document.querySelectorAll('.hacker-text');

        hackerTexts.forEach(element => {
            let interval = null;

            const startDecryptAnimation = (target) => {
                let iteration = 0;
                clearInterval(interval);
                
                const finalValue = target.dataset.value;

                interval = setInterval(() => {
                    target.innerText = finalValue
                        .split("")
                        .map((letter, index) => {
                            if(index < iteration) {
                                return finalValue[index];
                            }
                            if(finalValue[index] === ' ') return ' ';
                            return letters[Math.floor(Math.random() * letters.length)];
                        })
                        .join("");
                    
                    if(iteration >= finalValue.length){ 
                        clearInterval(interval);
                    }
                    
                    iteration += 1 / 3; 
                }, 30);
            };

            element.addEventListener('mouseover', (e) => startDecryptAnimation(e.target));
            
            setTimeout(() => {
                startDecryptAnimation(element);
            }, 300);
        });

        // Hiệu ứng Typewriter (Gõ chữ cho log hệ thống)
        const logLines = [
            "> ERR: Tài nguyên không tồn tại.",
            "> SYS: URL không hợp lệ hoặc dữ liệu hỏng.",
            "> ACT: Đang chờ lệnh mới..."
        ];
        
        const typeWriterElement = document.getElementById('typewriter-text');
        let currentLine = 0;
        let currentChar = 0;

        function typeWriter() {
            if (currentLine < logLines.length) {
                if (currentChar < logLines[currentLine].length) {
                    // Thêm từng ký tự
                    if(currentChar === 0 && currentLine !== 0) {
                        typeWriterElement.innerHTML += "<br>";
                    }
                    typeWriterElement.innerHTML += logLines[currentLine].charAt(currentChar);
                    currentChar++;
                    // Tốc độ gõ ngẫu nhiên tạo cảm giác thật
                    setTimeout(typeWriter, Math.random() * 50 + 20); 
                } else {
                    // Xong một dòng, chuyển dòng tiếp theo
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, 400); // Nghỉ giữa các dòng
                }
            }
        }

        // Bắt đầu gõ chữ sau khi delay 1 chút
        setTimeout(typeWriter, 1000);

    </script>
</body>
</html>
