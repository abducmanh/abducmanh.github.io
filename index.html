<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flat 2FA Authenticator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- OTP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>

    <style>
        /* --- CORE THEME: FLAT & SHARP --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f5; 
            /* Họa tiết lưới vuông vức, mờ nhạt */
            background-image: 
                linear-gradient(to right, #e4e4e7 1px, transparent 1px),
                linear-gradient(to bottom, #e4e4e7 1px, transparent 1px);
            background-size: 40px 40px;
            color: #000000;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* --- COMPONENTS --- */
        .sharp-box {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 0; /* Vuông góc hoàn toàn */
            position: relative;
        }

        /* Hiệu ứng đổ bóng cứng (Brutalism shadow) */
        .brutal-shadow {
            box-shadow: 6px 6px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        button.brutal-shadow:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000000;
        }

        .sharp-input {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 0;
            padding: 16px;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            color: #000000;
            outline: none; 
            width: 100%;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .sharp-input:focus {
            background: #f8fafc;
            border-color: #2563eb;
        }

        .primary-btn { 
            background: #000000; 
            color: #ffffff; 
            border: 2px solid #000000; 
            font-weight: 700; 
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .primary-btn:hover { 
            background: #1f2937; 
        }

        /* --- PROGRESS BAR --- */
        .progress-container {
            height: 6px;
            width: 100%;
            background: #e5e7eb;
            border: 1px solid #000000;
        }
        .progress-fill {
            height: 100%; 
            background: #000000; 
            transition: width 1s linear, background 0.3s;
        }
        .progress-fill.danger {
            background: #ef4444;
        }

        /* --- MODAL & TOAST --- */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal-content {
            transform: translateY(10px);
            transition: transform 0.2s ease;
        }
        .modal-overlay.open .modal-content { transform: translateY(0); }

        .toast {
            position: fixed; top: 24px; right: 24px;
            background: #000000;
            color: white;
            padding: 12px 20px; 
            border: 2px solid #000000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            transform: translateX(150%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200; display: flex; align-items: center; gap: 12px;
            font-weight: 600; font-size: 14px;
        }
        .toast.show { transform: translateX(0); }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-left: 1px solid #ddd; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .otp-font { 
            font-family: 'Space Mono', monospace; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <!-- MAIN LAYOUT -->
    <div class="w-full max-w-[1200px] flex flex-col lg:flex-row gap-6 relative z-10 lg:h-[calc(100vh-6rem)] lg:max-h-[720px] lg:min-h-[600px] items-stretch">
        
        <!-- ================= LEFT COLUMN: QUICK ACCESS ================= -->
        <div class="flex-1 flex flex-col gap-6">
            
            <!-- Header -->
            <div class="sharp-box brutal-shadow px-6 py-4 flex items-center justify-between shrink-0 bg-white">
                <h2 class="text-xl font-black uppercase flex items-center gap-3 tracking-tight">
                    <i data-lucide="shield-check" class="w-6 h-6 text-black"></i>
                    Auth<span class="text-gray-400">Sync</span>
                </h2>
                <div class="text-right">
                    <div id="date-display" class="text-xs font-bold text-gray-500 uppercase tracking-widest">...</div>
                    <div id="clock-display" class="text-xl font-bold otp-font leading-none mt-1">00:00:00</div>
                </div>
            </div>

            <!-- Input Zone -->
            <div class="sharp-box brutal-shadow p-6 flex flex-col relative group flex-1 min-h-[200px] lg:min-h-0 bg-white">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-xs font-bold text-gray-600 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="key" class="w-4 h-4"></i> Kiểm tra mã nhanh (Không lưu)
                    </label>
                    <button onclick="window.clearQuickInput()" class="text-gray-400 hover:text-black transition-colors" title="Xóa">
                        <i data-lucide="x-square" class="w-5 h-5"></i>
                    </button>
                </div>
                <textarea 
                    id="quick-input" 
                    class="sharp-input flex-1 resize-none bg-gray-50"
                    placeholder="Dán Secret Key vào đây..."
                    oninput="window.handleQuickInput(this)"></textarea>
            </div>

            <!-- Result Zone -->
            <div id="result-zone" class="sharp-box brutal-shadow p-8 flex flex-col items-center justify-center text-center relative flex-1 min-h-[250px] lg:min-h-0 bg-white">
                
                <!-- Empty State -->
                <div id="result-empty" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-10">
                    <i data-lucide="scan" class="w-12 h-12 text-gray-300 mb-4"></i>
                    <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Sẵn sàng tạo mã</p>
                </div>

                <!-- Content State -->
                <div id="result-content" class="w-full flex flex-col items-center justify-center h-full opacity-0 pointer-events-none z-10">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Mã Xác Thực 2FA</p>
                    
                    <div class="relative mb-6 cursor-pointer group w-full" onclick="window.copyResultText()">
                        <div id="quick-otp" class="otp-font text-6xl md:text-7xl font-bold text-black select-none break-all">
                            --- ---
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center bg-black text-white opacity-0 group-hover:opacity-100 transition-opacity text-xl font-bold uppercase tracking-widest">
                            Click để Copy
                        </div>
                    </div>

                    <div class="w-full max-w-[250px] mb-8">
                        <div class="progress-container">
                            <div id="quick-progress" class="progress-fill w-full"></div>
                        </div>
                    </div>

                    <div class="flex gap-4 w-full justify-center">
                        <button onclick="window.openSaveModal()" class="primary-btn brutal-shadow px-6 py-3 flex items-center justify-center gap-2 text-sm w-full max-w-[200px]">
                            <i data-lucide="save" class="w-4 h-4"></i> Lưu vào kho
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- ================= RIGHT COLUMN: VAULT ================= -->
        <div class="flex-1 lg:max-w-[450px] flex flex-col gap-6">
            
            <!-- Search & Add -->
            <div class="sharp-box brutal-shadow flex items-stretch shrink-0 bg-white p-1">
                <div class="flex items-center pl-3 flex-1">
                    <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
                    <input type="text" placeholder="Tìm kiếm dịch vụ..." oninput="window.filterTokens(this.value)" class="flex-1 bg-transparent border-none outline-none text-sm font-semibold p-3">
                </div>
                <button onclick="window.openSaveModal(true)" class="bg-black text-white w-12 flex items-center justify-center hover:bg-gray-800 transition-colors" title="Thêm thủ công">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- List Area Container -->
            <div class="sharp-box brutal-shadow flex-1 flex flex-col min-h-[400px] lg:min-h-0 relative p-4 bg-white">
                
                <div class="flex justify-between items-center mb-4 pb-4 border-b-2 border-gray-100">
                    <div class="flex items-center gap-2">
                        <h3 class="text-sm font-black uppercase tracking-widest">Kho Mã (Đồng Bộ)</h3>
                        <div id="sync-status" class="w-2 h-2 rounded-full bg-yellow-400" title="Đang kết nối..."></div>
                    </div>
                </div>

                <!-- Scroll List -->
                <div class="flex-1 overflow-y-auto custom-scroll pr-2 space-y-4" id="token-list">
                    <!-- Items generated by JS -->
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <i data-lucide="loader" class="w-8 h-8 animate-spin mb-2"></i>
                        <span class="text-xs font-bold uppercase">Đang tải dữ liệu...</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- ================= MODAL ================= -->
    <div id="save-modal" class="modal-overlay">
        <div class="sharp-box brutal-shadow modal-content w-[90%] max-w-[400px] p-8 bg-white">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-black uppercase tracking-widest">Thêm Mã Mới</h3>
                <button onclick="window.closeModal()" class="text-gray-400 hover:text-black">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Tên Dịch Vụ</label>
                    <input type="text" id="modal-label" placeholder="VD: Google, Github..." class="sharp-input" autofocus>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Secret Key</label>
                    <input type="text" id="modal-secret" placeholder="Chuỗi ký tự bí mật..." class="sharp-input font-mono text-sm">
                </div>
                
                <button onclick="window.addTokenFromModal()" class="primary-btn brutal-shadow w-full py-4 mt-4">
                    LƯU VÀO ĐÁM MÂY
                </button>
            </div>
        </div>
    </div>

    <!-- ================= TOAST ================= -->
    <div id="toast" class="toast">
        <i data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-msg">Thông báo</span>
    </div>

    <!-- ================= LOGIC & FIREBASE INTEGRATION ================= -->
    <script type="module">
        // 1. Firebase Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 2. State Variables
        let tokens = []; 
        let currentQuickSecret = null;
        let quickInterval = null;
        let currentFilter = "";
        let referenceServerTime = null;
        let referencePerfTime = null;
        let currentUser = null;
        let db;
        let appId;

        // 3. Initialize Firebase
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            appId = typeof __app_id !== 'undefined' ? __app_id : 'local-dev-app';
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);

            // Auth Flow (MANDATORY RULE 3)
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusDot = document.getElementById('sync-status');
                if (user) {
                    statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                    statusDot.title = "Đã kết nối đồng bộ";
                    setupFirestoreListener();
                } else {
                    statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                    statusDot.title = "Mất kết nối";
                }
            });

        } catch (error) {
            console.error("Firebase init failed, running in local fallback mode", error);
            // Fallback UI if Firebase fails
            document.getElementById('sync-status').className = "w-2 h-2 rounded-full bg-gray-400";
            document.getElementById('token-list').innerHTML = '<p class="text-sm text-gray-500 text-center mt-10">Môi trường không hỗ trợ kết nối Data.</p>';
        }

        // 4. Firestore Listener (Real-time Sync)
        function setupFirestoreListener() {
            if (!currentUser || !db) return;
            // RULE 1: Strict Paths
            const tokensRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tokens');
            
            onSnapshot(tokensRef, (snapshot) => {
                tokens = [];
                snapshot.forEach(doc => {
                    tokens.push({ id: doc.id, ...doc.data() });
                });
                // Sort locally by label for consistency
                tokens.sort((a, b) => a.label.localeCompare(b.label));
                window.rebuildList();
            }, (error) => {
                console.error("Lỗi đồng bộ dữ liệu:", error);
                window.showToast("Lỗi đồng bộ dữ liệu");
            });
        }

        // 5. Expose Functions to Window (for HTML onclick/oninput)
        window.updateClock = function() {
            const now = new Date();
            const dateOpts = { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' };
            const timeOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('date-display').innerText = now.toLocaleDateString('vi-VN', dateOpts);
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('vi-VN', timeOpts);
        }

        window.getCorrectTime = function() {
            // Đơn giản hóa, dùng giờ hệ thống
            return Date.now();
        }

        window.rebuildList = function() {
            const list = document.getElementById('token-list');
            const filtered = tokens.filter(t => t.label.toLowerCase().includes(currentFilter));
            list.innerHTML = '';

            if(filtered.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-70">
                        <i data-lucide="package-open" class="w-10 h-10 mb-3"></i>
                        <p class="text-xs font-bold uppercase tracking-widest">Kho trống</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filtered.forEach(token => {
                const el = document.createElement('div');
                el.className = 'border-2 border-black p-4 relative group bg-white';
                el.setAttribute('data-id', token.id);
                el.setAttribute('data-secret', token.secret); 
                
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="min-w-0 pr-2">
                            <p class="text-[10px] font-black text-black uppercase tracking-widest mb-1 truncate bg-gray-100 inline-block px-2 py-0.5 border border-black">${token.label}</p>
                            <div class="token-code text-3xl font-bold text-black otp-font tracking-tight">--- ---</div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button class="w-8 h-8 bg-black text-white flex items-center justify-center hover:bg-gray-800 transition-colors" onclick="window.copyTokenCode('${token.secret}')" title="Copy">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                            <button class="w-8 h-8 border-2 border-black text-black flex items-center justify-center hover:bg-red-500 hover:text-white hover:border-red-500 transition-colors" onclick="window.deleteToken('${token.id}')" title="Delete">
                                <i data-lucide="trash" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="progress-container flex-1">
                            <div class="progress-fill" style="width: 100%"></div>
                        </div>
                        <div class="token-timer text-xs font-mono font-bold w-6 text-right">30s</div>
                    </div>
                `;
                list.appendChild(el);
            });
            lucide.createIcons();
            window.updateVaultUI(); 
        }

        window.updateVaultUI = function() {
            const now = window.getCorrectTime();
            const items = document.querySelectorAll('#token-list > div[data-secret]');

            items.forEach(el => {
                const secret = el.getAttribute('data-secret');
                if(!secret) return;

                try {
                    const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) });
                    const code = totp.generate({ timestamp: now });
                    const period = 30;
                    const epoch = now / 1000.0;
                    const countDown = period - (epoch % period);
                    const pct = (countDown / period) * 100;

                    const codeEl = el.querySelector('.token-code');
                    const timerEl = el.querySelector('.token-timer');
                    const fillEl = el.querySelector('.progress-fill');

                    const fmt = `${code.substring(0,3)} ${code.substring(3)}`;
                    if(codeEl.innerText !== fmt) codeEl.innerText = fmt;
                    
                    timerEl.innerText = Math.floor(countDown) + 's';
                    fillEl.style.width = `${pct}%`;

                    if(countDown < 5) {
                        fillEl.classList.add('danger');
                        timerEl.classList.add('text-red-600');
                        codeEl.classList.add('text-red-600');
                    } else {
                        fillEl.classList.remove('danger');
                        timerEl.classList.remove('text-red-600');
                        codeEl.classList.remove('text-red-600');
                    }
                } catch(e) {}
            });
        }

        window.clearQuickInput = function() {
            document.getElementById('quick-input').value = '';
            window.handleQuickInput({value: ''});
        }

        window.handleQuickInput = function(el) {
            let raw = el.value.trim();
            if(!raw) return window.resetQuickView();
            
            if (raw.includes('secret=')) {
                const m = raw.match(/secret=([a-zA-Z2-7]+)/);
                if (m) raw = m[1];
            }
            const secret = raw.replace(/\s/g, '').toUpperCase();

            try {
                new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) }).generate(); 
                currentQuickSecret = secret;
                window.showQuickResult();
            } catch(e) {}
        };

        window.showQuickResult = function() {
            const empty = document.getElementById('result-empty');
            const content = document.getElementById('result-content');
            
            empty.style.display = 'none';
            content.style.opacity = '1';
            content.style.pointerEvents = 'auto';
            
            if(quickInterval) clearInterval(quickInterval);
            quickInterval = setInterval(window.updateQuickDisplay, 100);
            window.updateQuickDisplay();
        }

        window.resetQuickView = function() {
            const empty = document.getElementById('result-empty');
            const content = document.getElementById('result-content');
            
            content.style.opacity = '0';
            content.style.pointerEvents = 'none';
            empty.style.display = 'flex';

            currentQuickSecret = null;
            if(quickInterval) clearInterval(quickInterval);
        };

        window.updateQuickDisplay = function() {
            if(!currentQuickSecret) return;
            const now = window.getCorrectTime();
            const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(currentQuickSecret) });
            const code = totp.generate({ timestamp: now });
            const period = 30;
            const epoch = now / 1000.0;
            const countDown = period - (epoch % period);
            const pct = (countDown / period) * 100;

            const el = document.getElementById('quick-otp');
            const fmt = `${code.substring(0,3)} ${code.substring(3)}`;
            if(el.innerText !== fmt) el.innerText = fmt;

            const bar = document.getElementById('quick-progress');
            bar.style.width = `${pct}%`;
            
            if(countDown < 5) {
                bar.classList.add('danger');
                el.classList.add('text-red-600');
            } else {
                bar.classList.remove('danger');
                el.classList.remove('text-red-600');
            }
        }

        window.openSaveModal = function(isManual = false) {
            const modal = document.getElementById('save-modal');
            const lbl = document.getElementById('modal-label');
            const sec = document.getElementById('modal-secret');

            sec.value = isManual ? "" : (currentQuickSecret || "");
            lbl.value = "";
            modal.classList.add('open');
            setTimeout(() => lbl.focus(), 100);
        };

        window.closeModal = function() { document.getElementById('save-modal').classList.remove('open'); };

        window.addTokenFromModal = async function() {
            if(!currentUser) return window.showToast("Chưa kết nối Cloud!");
            
            const label = document.getElementById('modal-label').value.trim() || "Dịch vụ";
            const secret = document.getElementById('modal-secret').value.replace(/\s/g, '').toUpperCase();
            
            if(!secret) return window.showToast("Thiếu mã Secret Key!");
            
            try {
                // Validate secret
                new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) }).generate();
                
                // Write to Firestore
                const newId = Date.now().toString();
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tokens', newId);
                await setDoc(docRef, { label, secret });

                window.closeModal();
                if(currentQuickSecret && secret === currentQuickSecret) {
                    window.clearQuickInput();
                }
                window.showToast("Đã lưu lên Cloud!");
            } catch(e) { 
                console.error(e);
                window.showToast("Mã khóa không hợp lệ"); 
            }
        };

        window.deleteToken = async function(id) { 
            if(!currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tokens', id);
            await deleteDoc(docRef);
            window.showToast("Đã xóa khỏi Cloud");
        };

        window.filterTokens = function(val) { 
            currentFilter = val.toLowerCase(); 
            window.rebuildList(); 
        };

        window.copyResultText = function() { 
            window.copyText(document.getElementById('quick-otp').innerText.replace(/\s/g, '')); 
        };

        window.copyTokenCode = function(secret) { 
            const code = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) }).generate({timestamp: window.getCorrectTime()});
            window.copyText(code); 
        };

        window.copyText = function(text) {
            const fallback = () => {
                try {
                    const ta = document.createElement("textarea"); ta.value = text;
                    ta.style.position="fixed"; ta.style.left="-9999px";
                    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                    window.showToast("Đã sao chép mã");
                } catch(e) { window.showToast("Lỗi sao chép"); }
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => window.showToast("Đã sao chép mã")).catch(fallback);
            } else fallback();
        }

        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setInterval(window.updateClock, 1000); 
            window.updateClock();
            setInterval(window.updateVaultUI, 100);
        });
    </script>
</body>
</html>
