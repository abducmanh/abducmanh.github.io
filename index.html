<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get 2FA Authenticator</title>
        <link rel="icon" href="favicon.ico">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- OTP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>

    <style>
        /* --- CORE THEME: CRYSTAL OS --- */
        body {
            font-family: 'Inter', sans-serif; /* Clean Apple-like Font */
            background-color: #f2f2f7;
            margin: 0; padding: 0;
            min-height: 100vh;
            color: #1d1d1f;
            overflow-x: hidden;
        }

        #fluid-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            filter: blur(80px) saturate(1.2); 
            opacity: 0.6; pointer-events: none;
        }

        /* --- GLASS COMPONENTS --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            position: relative; overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-noise {
            position: absolute; inset: 0; opacity: 0.3; pointer-events: none; mix-blend-mode: overlay; z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .content-layer { position: relative; z-index: 10; }

        /* --- INPUTS & BUTTONS --- */
        .crystal-input {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            font-family: 'Space Mono', monospace; /* Monospace for alignment */
            font-size: 15px; /* Slightly larger */
            font-weight: 500; /* Bolder */
            color: #1d1d1f;
            outline: none; resize: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .crystal-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 122, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .primary-btn { 
            background: #1d1d1f; color: white; border: none; font-weight: 700; /* Bolder */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .primary-btn:hover { 
            background: #000; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); 
            transform: translateY(-2px); 
        }

        .crystal-btn {
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            color: #1d1d1f; font-weight: 600; /* Bolder */
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
        }
        .crystal-btn:hover { 
            background: white; border-color: rgba(0, 0, 0, 0.1); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }

        .delete-btn {
            color: #ef4444; background: rgba(254, 226, 226, 0.3);
            border: 1px solid rgba(252, 165, 165, 0.2); transition: all 0.2s;
        }
        .delete-btn:hover { background: #fee2e2; border-color: #fca5a5; }

        /* --- LIST ITEMS (NO FLICKER) --- */
        .token-item {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 16px;
            transition: transform 0.2s, background 0.2s;
            animation: slideIn 0.4s ease-out forwards;
        }
        .token-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            z-index: 5;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .progress-bar {
            height: 6px; /* Slightly thicker */
            border-radius: 99px; width: 100%;
            background: rgba(0,0,0,0.05); overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #3b82f6; border-radius: 99px;
            transition: width 1s linear, background-color 0.3s;
        }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal-glass {
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px; padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.open .modal-glass { transform: scale(1) translateY(0); }

        /* --- TOAST --- */
        .toast {
            position: fixed; top: 24px; right: 24px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            padding: 12px 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200; display: flex; align-items: center; gap: 10px;
            font-weight: 600; font-size: 14px;
        }
        .toast.show { transform: translateX(0); }

        /* --- MISC --- */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        /* NEW FONT FOR CODE - BOLD & CLEAN */
        .otp-font { 
            font-family: 'Space Mono', monospace; 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -0.5px;
            font-weight: 700; /* Bold */
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <canvas id="fluid-canvas"></canvas>

    <!-- MAIN LAYOUT (WIDE DESKTOP LAYOUT) -->
    <div class="w-full max-w-[1400px] grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <!-- HEADER (Mobile Only) -->
        <div class="lg:hidden col-span-1 text-center mb-2">
            <h1 class="text-xl font-bold text-gray-900">Crystal Auth</h1>
        </div>

        <!-- LEFT PANEL: QUICK ACCESS (7 Cols) - HORIZONTAL LAYOUT -->
        <div class="glass-panel col-span-1 lg:col-span-7 p-8 flex flex-col h-[640px]">
            <div class="glass-noise"></div>
            <div class="content-layer h-full flex flex-col">
                
                <h2 class="text-xl font-bold flex items-center gap-2 mb-6 text-gray-800 tracking-tight">
                    <i data-lucide="zap" class="w-6 h-6 text-yellow-500 fill-yellow-500"></i>
                    Lấy Mã Nhanh
                </h2>

                <!-- SPLIT AREA: Input (Left) & Result (Right) -->
                <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- 1. INPUT ZONE -->
                    <div class="relative bg-white/40 rounded-[24px] border border-white/60 shadow-sm p-1 flex flex-col group transition-all h-full hover:bg-white/50">
                        <div class="absolute top-4 right-4 z-20 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="window.clearQuickInput()" class="w-8 h-8 rounded-full bg-white/80 hover:bg-red-50 text-gray-400 hover:text-red-500 flex items-center justify-center transition-colors shadow-sm" title="Xóa nội dung">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <textarea 
                            id="quick-input" 
                            class="crystal-input w-full h-full text-base leading-relaxed placeholder-gray-400 bg-transparent shadow-none border-none focus:shadow-none focus:border-none p-6 resize-none font-medium"
                            placeholder="Dán Secret Key vào đây..."
                            oninput="window.handleQuickInput(this)"></textarea>
                        
                        <div class="absolute bottom-4 right-4 flex items-center gap-2 text-[11px] font-bold text-gray-400 pointer-events-none uppercase tracking-wide">
                            <i data-lucide="keyboard" class="w-3 h-3"></i> Auto-Detect
                        </div>
                    </div>

                    <!-- 2. RESULT ZONE -->
                    <div id="result-zone" class="relative bg-white/60 backdrop-blur-xl rounded-[24px] border border-white/80 shadow-md p-6 flex flex-col items-center justify-center text-center transition-all h-full">
                        
                        <!-- Empty State -->
                        <div id="result-empty" class="absolute inset-0 flex flex-col items-center justify-center opacity-100 transition-opacity duration-300">
                            <div class="w-16 h-16 bg-white/50 rounded-full flex items-center justify-center mb-4 shadow-sm border border-white/60">
                                <i data-lucide="lock" class="w-8 h-8 text-gray-400"></i>
                            </div>
                            <p class="text-sm font-bold text-gray-400">Chưa có mã nào</p>
                        </div>

                        <!-- Content State -->
                        <div id="result-content" class="w-full flex flex-col items-center justify-center h-full opacity-0 pointer-events-none transition-opacity duration-300 scale-95 transform">
                            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-auto pt-4">Mã Xác Thực</p>
                            
                            <!-- Big Code -->
                            <div class="relative mb-8 cursor-pointer group w-full my-auto" onclick="window.copyResultText()">
                                <div id="quick-otp" class="otp-font text-5xl md:text-6xl font-bold text-gray-800 transition-transform group-hover:scale-105 select-none break-all tracking-tight">
                                    --- ---
                                </div>
                                <p class="text-[11px] font-bold text-blue-500 mt-2 opacity-0 group-hover:opacity-100 transition-opacity absolute w-full -bottom-6 left-0 uppercase tracking-wide">Nhấn để sao chép</p>
                            </div>

                            <!-- Progress & Actions -->
                            <div class="w-full mt-auto pb-4">
                                <div class="w-32 h-2 bg-gray-200/80 rounded-full mb-6 overflow-hidden mx-auto">
                                    <div id="quick-progress" class="h-full bg-blue-500 w-full transition-all duration-1000 ease-linear"></div>
                                </div>

                                <div class="flex gap-3 w-full">
                                    <button onclick="window.copyResultText()" class="primary-btn flex-1 py-3 rounded-xl flex items-center justify-center gap-2 text-xs uppercase tracking-wide">
                                        <i data-lucide="copy" class="w-4 h-4"></i> Sao chép
                                    </button>
                                    <button onclick="window.openSaveModal()" class="crystal-btn w-12 rounded-xl flex items-center justify-center hover:text-blue-600 transition-colors" title="Lưu">
                                        <i data-lucide="save" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: VAULT (5 Cols) -->
        <div class="glass-panel col-span-1 lg:col-span-5 flex flex-col h-[640px]">
            <div class="glass-noise"></div>
            <div class="content-layer flex-1 flex flex-col h-full">
                
                <!-- Date/Time Header (Removed Sync Button) -->
                <div class="p-6 border-b border-white/50 bg-white/20 flex justify-between items-center">
                    <div>
                        <div id="date-display" class="text-xs font-bold text-gray-500 uppercase tracking-wide">...</div>
                        <div id="clock-display" class="text-3xl font-bold text-gray-800 otp-font leading-none mt-1 tracking-tight">00:00:00</div>
                    </div>
                    <!-- Sync Button Hidden -->
                    <button id="btn-sync" class="hidden"></button> 
                </div>

                <!-- Search -->
                <div class="px-6 py-4">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" placeholder="Tìm kiếm..." oninput="window.filterTokens(this.value)" class="w-full bg-white/40 border border-white/60 rounded-xl py-2.5 pl-10 pr-4 text-sm font-medium text-gray-800 outline-none focus:bg-white/80 focus:border-blue-400 transition-all shadow-inner">
                    </div>
                </div>

                <!-- The List -->
                <div class="flex-1 overflow-y-auto px-4 pb-4 custom-scroll space-y-3" id="token-list">
                    <!-- Items -->
                </div>

                <!-- Footer Actions -->
                <div class="p-5 border-t border-white/50 bg-white/20 flex gap-3">
                    <button onclick="window.openSaveModal(true)" class="crystal-btn flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-wide flex items-center justify-center gap-2 hover:text-black shadow-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i> Thêm thủ công
                    </button>
                    <div class="flex gap-2">
                        <button onclick="window.exportData()" class="crystal-btn w-12 rounded-xl flex items-center justify-center text-gray-500 hover:text-blue-600 shadow-sm" title="Backup">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>
                        <button onclick="document.getElementById('import-file').click()" class="crystal-btn w-12 rounded-xl flex items-center justify-center text-gray-500 hover:text-green-600 shadow-sm" title="Restore">
                            <i data-lucide="upload" class="w-4 h-4"></i>
                        </button>
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="window.importData(this)">
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- MODAL (Transparent Glass) -->
    <div id="save-modal" class="modal-overlay">
        <div class="modal-glass">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <i data-lucide="save" class="w-5 h-5 text-blue-600"></i> Lưu Mã
                </h3>
                <button onclick="window.closeModal()" class="w-8 h-8 rounded-full bg-black/5 hover:bg-black/10 flex items-center justify-center transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Tên dịch vụ</label>
                    <input type="text" id="modal-label" placeholder="Ví dụ: Google, Facebook..." class="crystal-input w-full p-3 text-base font-medium rounded-xl bg-white/60 focus:bg-white" autofocus>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Secret Key</label>
                    <input type="text" id="modal-secret" placeholder="Mã khóa..." class="crystal-input w-full p-3 text-sm font-mono font-medium rounded-xl bg-white/60 focus:bg-white text-gray-600">
                </div>
                
                <button onclick="window.addTokenFromModal()" class="primary-btn w-full py-3.5 rounded-xl text-sm font-bold uppercase tracking-wide shadow-lg shadow-blue-500/20 mt-2">
                    Lưu vào Kho
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <div class="bg-green-100 p-1 rounded-full"><i data-lucide="check" class="w-4 h-4 text-green-600"></i></div>
        <span id="toast-msg">Thành công</span>
    </div>

    <script>
        // --- ANIMATED BACKGROUND ---
        const canvas = document.getElementById('fluid-canvas');
        const ctxBg = canvas.getContext('2d');
        let width, height, orbs = [];
        const colors = [{r:59,g:130,b:246}, {r:139,g:92,b:246}, {r:236,g:72,b:153}, {r:16,g:185,b:129}];

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        class Orb {
            constructor() { this.init(); }
            init() { 
                this.radius = Math.random()*120+80; this.x = Math.random()*width; this.y = Math.random()*height; 
                this.vx = (Math.random()-0.5)*0.5; this.vy = (Math.random()-0.5)*0.5; 
                this.color = colors[Math.floor(Math.random()*colors.length)]; 
            }
            update() { 
                this.x+=this.vx; this.y+=this.vy; 
                if(this.x<-200||this.x>width+200) this.vx*=-1; if(this.y<-200||this.y>height+200) this.vy*=-1; 
            }
            draw(ctx) { 
                const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius);
                g.addColorStop(0,`rgba(${this.color.r},${this.color.g},${this.color.b},0.3)`); 
                g.addColorStop(1,`rgba(${this.color.r},${this.color.g},${this.color.b},0)`); 
                ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle=g; 
                ctx.globalCompositeOperation='multiply'; ctx.fill(); 
            }
        }
        function initBackground() { resize(); orbs=[]; for(let i=0;i<6;i++) orbs.push(new Orb()); loop(); }
        function loop() { ctxBg.clearRect(0,0,width,height); orbs.forEach(o=>{o.update();o.draw(ctxBg)}); requestAnimationFrame(loop); }
        window.addEventListener('resize', ()=>{resize(); initBackground();}); initBackground();

        // --- GLOBAL VARIABLES (Accessible from HTML) ---
        let tokens = JSON.parse(localStorage.getItem('2fa_tokens')) || [];
        let currentQuickSecret = null;
        let quickInterval = null;
        let currentFilter = "";
        let timeOffset = 0;
        let referenceServerTime = null;
        let referencePerfTime = null;

        // Init Lucide
        lucide.createIcons();

        // --- GLOBAL FUNCTIONS EXPOSED TO WINDOW ---
        
        window.updateClock = function() {
            const now = new Date();
            const dateOpts = { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' };
            const timeOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('date-display').innerText = now.toLocaleDateString('vi-VN', dateOpts);
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('vi-VN', timeOpts);
        }

        window.syncTime = async function() {
            // No button spinning since it is hidden
            const setTime = (serverTime) => {
                referenceServerTime = serverTime;
                referencePerfTime = performance.now();
                window.updateVaultUI(); // Instant update
                if(currentQuickSecret) window.updateQuickDisplay();
            };

            try {
                const s = performance.now();
                const r = await fetch('https://1.1.1.1/cdn-cgi/trace');
                if(r.ok) {
                    const t = await r.text();
                    const m = t.match(/ts=([0-9\.]+)/);
                    if(m) return setTime(parseFloat(m[1])*1000 + (performance.now()-s)/2);
                }
            } catch(e) {}
            
            // Fallback
            referenceServerTime = Date.now();
            referencePerfTime = performance.now();
        }

        window.getCorrectTime = function() {
            return (referenceServerTime && referencePerfTime) 
                ? referenceServerTime + (performance.now() - referencePerfTime) 
                : Date.now();
        }

        // --- VAULT ENGINE ---
        
        window.rebuildList = function() {
            const list = document.getElementById('token-list');
            const filtered = tokens.filter(t => t.label.toLowerCase().includes(currentFilter));
            list.innerHTML = '';

            if(filtered.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 opacity-40 text-gray-500">
                        <i data-lucide="archive" class="w-10 h-10 mb-2"></i>
                        <p class="text-xs font-bold uppercase tracking-wide">Kho trống</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filtered.forEach(token => {
                const el = document.createElement('div');
                el.className = 'token-item group relative overflow-hidden';
                el.setAttribute('data-id', token.id);
                el.setAttribute('data-secret', token.secret); 
                
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div class="min-w-0 pr-4">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5 truncate">${token.label}</p>
                            <div class="token-code text-2xl font-bold text-gray-800 otp-font tracking-tight">--- ---</div>
                        </div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                            <button class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-blue-600 transition-colors shadow-sm" onclick="window.copyTokenCode('${token.secret}')">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                            <button class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-red-500 transition-colors shadow-sm delete-btn" onclick="window.deleteToken(${token.id})">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 100%"></div>
                        </div>
                        <div class="token-timer text-[10px] font-mono font-bold text-gray-400 w-6 text-right">30s</div>
                    </div>
                `;
                list.appendChild(el);
            });
            lucide.createIcons();
            window.updateVaultUI(); 
        }

        window.updateVaultUI = function() {
            const now = window.getCorrectTime();
            const items = document.querySelectorAll('.token-item');

            items.forEach(el => {
                const secret = el.getAttribute('data-secret');
                if(!secret) return;

                try {
                    const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) });
                    const code = totp.generate({ timestamp: now });
                    const period = 30;
                    const epoch = now / 1000.0;
                    const countDown = period - (epoch % period);
                    const pct = (countDown / period) * 100;

                    const codeEl = el.querySelector('.token-code');
                    const timerEl = el.querySelector('.token-timer');
                    const fillEl = el.querySelector('.progress-fill');

                    const fmt = `${code.substring(0,3)} ${code.substring(3)}`;
                    if(codeEl.innerText !== fmt) codeEl.innerText = fmt;
                    
                    timerEl.innerText = Math.floor(countDown) + 's';
                    fillEl.style.width = `${pct}%`;

                    if(countDown < 5) {
                        fillEl.style.backgroundColor = '#ef4444'; 
                        timerEl.classList.add('text-red-500');
                        codeEl.classList.add('text-red-500');
                    } else {
                        fillEl.style.backgroundColor = '#3b82f6';
                        timerEl.classList.remove('text-red-500');
                        codeEl.classList.remove('text-red-500');
                    }
                } catch(e) {}
            });
        }

        // --- QUICK INPUT ---
        window.clearQuickInput = function() {
            document.getElementById('quick-input').value = '';
            window.handleQuickInput({value: ''});
        }

        window.handleQuickInput = function(el) {
            let raw = el.value.trim();
            if(!raw) return window.resetQuickView();
            
            if (raw.includes('secret=')) {
                const m = raw.match(/secret=([a-zA-Z2-7]+)/);
                if (m) raw = m[1];
            }
            const secret = raw.replace(/\s/g, '').toUpperCase();

            try {
                const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) });
                totp.generate(); 
                currentQuickSecret = secret;
                window.showQuickResult();
            } catch(e) {}
        };

        window.showQuickResult = function() {
            const empty = document.getElementById('result-empty');
            const content = document.getElementById('result-content');
            
            empty.style.opacity = '0';
            content.style.opacity = '1';
            content.style.pointerEvents = 'auto';
            content.style.transform = 'scale(1)';
            
            if(quickInterval) clearInterval(quickInterval);
            quickInterval = setInterval(window.updateQuickDisplay, 100);
            window.updateQuickDisplay();
        }

        window.resetQuickView = function() {
            const empty = document.getElementById('result-empty');
            const content = document.getElementById('result-content');
            
            empty.style.opacity = '1';
            content.style.opacity = '0';
            content.style.pointerEvents = 'none';
            content.style.transform = 'scale(0.95)';

            currentQuickSecret = null;
            if(quickInterval) clearInterval(quickInterval);
        };

        window.updateQuickDisplay = function() {
            if(!currentQuickSecret) return;
            const now = window.getCorrectTime();
            const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(currentQuickSecret) });
            const code = totp.generate({ timestamp: now });
            const period = 30;
            const epoch = now / 1000.0;
            const countDown = period - (epoch % period);
            const pct = (countDown / period) * 100;

            const el = document.getElementById('quick-otp');
            const fmt = `${code.substring(0,3)} ${code.substring(3)}`;
            if(el.innerText !== fmt) el.innerText = fmt;

            const bar = document.getElementById('quick-progress');
            bar.style.width = `${pct}%`;
            
            if(countDown < 5) {
                bar.style.backgroundColor = '#ef4444';
                el.classList.add('text-red-500');
            } else {
                bar.style.backgroundColor = '#3b82f6';
                el.classList.remove('text-red-500');
            }
        }

        // --- MODAL ---
        window.openSaveModal = function(isManual = false) {
            const modal = document.getElementById('save-modal');
            const lbl = document.getElementById('modal-label');
            const sec = document.getElementById('modal-secret');

            if(isManual) {
                currentQuickSecret = null;
                sec.value = "";
                lbl.value = "";
            } else {
                sec.value = currentQuickSecret || "";
                lbl.value = "";
            }

            modal.classList.add('open');
            setTimeout(() => lbl.focus(), 100);
        };

        window.closeModal = function() {
            document.getElementById('save-modal').classList.remove('open');
        };

        window.addTokenFromModal = function() {
            const l = document.getElementById('modal-label').value;
            const s = document.getElementById('modal-secret').value.replace(/\s/g, '').toUpperCase();
            if(!s) return window.showToast("Thiếu mã khóa!", "alert-circle");
            try {
                new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(s) }).generate();
                tokens.push({ id: Date.now(), label: l || "Dịch vụ", secret: s });
                window.saveTokens();
                window.closeModal();
                if(currentQuickSecret && s === currentQuickSecret) {
                    document.getElementById('quick-input').value = '';
                    window.resetQuickView();
                }
                window.showToast("Đã lưu thành công");
            } catch(e) { window.showToast("Mã khóa không hợp lệ", "alert-circle"); }
        };

        // --- UTILS ---
        window.saveTokens = function() {
            localStorage.setItem('2fa_tokens', JSON.stringify(tokens));
            window.rebuildList();
        };

        window.deleteToken = function(id) {
            if(confirm("Xóa mã này?")) {
                tokens = tokens.filter(t => t.id !== id);
                window.saveTokens();
            }
        };

        window.filterTokens = function(val) {
            currentFilter = val.toLowerCase();
            window.rebuildList();
        };

        window.copyResultText = function() {
            const el = document.getElementById('quick-otp');
            window.copyText(el.innerText.replace(/\s/g, ''));
        };

        window.copyTokenCode = function(secret) {
            const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(secret) });
            window.copyText(totp.generate({timestamp: window.getCorrectTime()}));
        };

        window.copyText = function(text) {
            const fallback = () => {
                try {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    ta.style.position="fixed"; ta.style.left="-9999px";
                    document.body.appendChild(ta); ta.select();
                    document.execCommand('copy'); document.body.removeChild(ta);
                    window.showToast("Đã sao chép");
                } catch(e) { window.showToast("Lỗi sao chép", "alert-circle"); }
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => window.showToast("Đã sao chép")).catch(fallback);
            } else fallback();
        }

        window.showToast = function(msg, icon="check") {
            const t = document.getElementById('toast');
            t.innerHTML = `<div class="bg-green-100 p-1 rounded-full"><i data-lucide="${icon}" class="w-4 h-4 text-green-600"></i></div><span>${msg}</span>`;
            lucide.createIcons();
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.exportData = function() {
            const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tokens));
            const a = document.createElement('a'); a.href = data; a.download = "2fa_backup.json"; a.click();
        };
        
        window.importData = function(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (e) => {
                try {
                    const d = JSON.parse(e.target.result);
                    if(Array.isArray(d)) {
                        d.forEach(t => { if(t.secret && !tokens.some(x=>x.secret===t.secret)) tokens.push({id:Date.now()+Math.random(), label:t.label, secret:t.secret}); });
                        window.saveTokens(); window.showToast("Đã nhập dữ liệu");
                    }
                } catch(e) { window.showToast("File lỗi", "alert-circle"); }
            }; r.readAsText(f); input.value = '';
        };

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            setInterval(window.updateClock, 1000);
            window.updateClock();
            if(navigator.onLine) window.syncTime();
            setInterval(window.updateVaultUI, 100);
            window.rebuildList();
        });
    </script>
</body>
</html>
